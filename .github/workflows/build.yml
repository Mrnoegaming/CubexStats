name: CubexStats
 
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
 
      - name: Build Maven
        run: mvn clean package -B --no-transfer-progress
 
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: CubexStats
          path: target/Cubex-StatsSync-*.jar
          if-no-files-found: error
          retention-days: 90
 
